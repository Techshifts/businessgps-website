# Netlify Configuration for BusinessGPS.ai
# Production e-commerce platform with Stripe, AWeber, HubSpot integrations

[build]
  publish = "."
  functions = "netlify/functions"

# Function-specific configuration
[functions]
  # Use Node.js 18 for all functions
  node_bundler = "esbuild"

# Production context (main branch)
[context.production]
  environment = { DEPLOY_CONTEXT = "production" }

# Staging context (staging branch)
[context.staging]
  environment = { DEPLOY_CONTEXT = "staging" }

# Branch deploy context (feature branches)
[context.branch-deploy]
  environment = { DEPLOY_CONTEXT = "preview" }

# Clean URL Redirects
[[redirects]]
  from = "/athena-v3"
  to = "/pages/athena.html"
  status = 200

